name: Read Key Vault Secret (Reusable)

on:
  workflow_call:
    inputs:
      secret_name:
        description: 'Name of the secret to read from Key Vault'
        required: true
        type: string
      keyvault_name:
        description: 'Name of the Key Vault'
        required: true
        type: string
    outputs:
      secret_retrieved:
        description: 'Whether the secret was successfully retrieved'
        value: ${{ jobs.read-secret.outputs.success }}
      secret_value:
        description: 'The secret value retrieved from Key Vault'
        value: ${{ jobs.read-secret.outputs.secret_value }}

permissions:
  id-token: write   # Required for OIDC token request
  contents: read

jobs:
  read-secret:
    runs-on: ubuntu-latest
    outputs:
      success: ${{ steps.read.outputs.success }}
      secret_value: ${{ steps.read.outputs.secret_value }}
    steps:
      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Read secret from Key Vault
        id: read
        run: |
          SECRET_VALUE=$(az keyvault secret show \
            --vault-name "${{ inputs.keyvault_name }}" \
            --name "${{ inputs.secret_name }}" \
            --query value -o tsv)

          if [ -n "$SECRET_VALUE" ]; then
            echo "✅ SUCCESS: Retrieved secret '${{ inputs.secret_name }}' from Key Vault"
            echo "   Caller repo: ${{ github.repository }}"
            echo "secret_value=$SECRET_VALUE" >> "$GITHUB_OUTPUT"
            echo "success=true" >> "$GITHUB_OUTPUT"
          else
            echo "❌ FAILURE: Could not read secret"
            echo "success=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi